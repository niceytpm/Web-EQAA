<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหา ID MACHINE</title>

<script src="xlsx.full.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

/* 1. จัดให้ Container หลักอยู่กึ่งกลางหน้าจอเสมอ */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000000;
    margin: 0;
    padding: 16px;
    display: flex;
    justify-content: center; /* จัดกึ่งกลางแนวนอน */
    align-items: flex-start; /* เริ่มจากด้านบนเพื่อให้เหมาะกับ Slide Over */
    min-height: 100vh;
}

/* 2. ตัวกล่องแอปพลิเคชัน */
.container {
    background: #1c1c1e;
    padding: 24px 20px;
    border-radius: 24px;
    width: 100%;
    max-width: 360px; /* คุมขนาดไม่ให้กว้างเกินไปเมื่อขยายหน้าต่าง */
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    
    /* จัดสิ่งของภายในกล่องให้อยู่กึ่งกลางแนวดิ่ง */
    display: flex;
    flex-direction: column;
    align-items: center; 
}

/* 3. หัวข้อ */
.header-title {
    color: #ffffff;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-align: center;
}

/* 4. โซนกรอกข้อมูล (จัดให้อยู่กึ่งกลางและกว้างพอดี) */
.search-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
    width: 100%;
    border-bottom: 1px solid #2c2c2e; /* เพิ่มเส้นใต้บางๆ ให้ดูเป็นระเบียบ */
    padding-bottom: 8px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: #ffffff;
    font-size: 18px;
    outline: none;
    width: 100%;
}

input::placeholder {
    color: #55555c;
}

.btn-paste {
    background: #34c759;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
}

/* 5. ปุ่มค้นหา */
.btn-search {
    width: 100%;
    background: #2f80ed;
    color: #ffffff;
    border: none;
    font-size: 18px;
    font-weight: 500;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 20px;
    text-align: center;
}

.status {
    font-size: 14px;
    color: #ff453a;
    text-align: center;
    margin-bottom: 10px;
}

/* 6. ส่วนของผลลัพธ์ (ทุกอย่างในนี้จะถูกจัดกึ่งกลางทั้งหมด) */
.result-box {
    display: flex;
    flex-direction: column;
    align-items: center; /* จัดกึ่งกลางองค์ประกอบภายในทั้งหมด */
    justify-content: center;
    gap: 12px;
    width: 100%;
}

.tags-inline {
    display: flex;
    justify-content: center; /* จัดแท็กให้อยู่กึ่งกลางแนวนอน */
    gap: 8px;
    flex-wrap: wrap; /* ถ้าหน้าต่างแคบเกินไป แท็กจะตกลงมาตรงกลางพอดียังไม่หลุดขอบ */
    width: 100%;
}

.tag-gray {
    background: #242426;
    color: #ffffff;
    padding: 6px 16px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
}

.tag-blue-container {
    background: #101a2d;
    padding: 6px 18px;
    border-radius: 12px;
    display: inline-flex;
    justify-content: center;
}

.tag-blue-text {
    color: #2f80ed;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
}

.bottom-line {
    width: 100%;
    height: 1px;
    background: #2c2c2e;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="container">
    <div class="header-title">🔍 ค้นหา ID MACHINE</div>

    <div class="search-row">
        <input id="machineCode" placeholder="EYHJE2400018">
        <button class="btn-paste" onclick="pasteFromClipboard()">วาง</button>
    </div>
    
    <button class="btn-search" onclick="search()">ค้นหา</button>

    <div class="status" id="status"></div>
    
    <div id="result" style="width: 100%;"></div>
</div>

<script>
let data = [];

// ดึงไฟล์ Excel
fetch("data.xlsx")
.then(r => r.arrayBuffer())
.then(b => {
    const wb = XLSX.read(b, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    let rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
    data = rows.slice(1).filter(r => r[0]);
})
.catch(() => {
    document.getElementById("status").innerText = "❌ โหลดไฟล์ Excel ไม่ได้";
});

function clean(v) {
    return String(v || "").replace(/[\s\u00A0]+/g, "").toUpperCase();
}

async function pasteFromClipboard() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById("machineCode").value = text;
    } catch (err) {
        document.getElementById("status").innerText = "⚠️ เข้าถึงคลิปบอร์ดไม่ได้";
    }
}

function search() {
    const key = clean(document.getElementById("machineCode").value);
    const resultDiv = document.getElementById("result");
    const status = document.getElementById("status");

    resultDiv.innerHTML = "";
    status.innerText = "";

    const found = data.filter(r => clean(r[0]).includes(key));

    if (found.length === 0) {
        status.innerText = "❌ ไม่พบข้อมูล";
        return;
    }

    const firstMatch = found[0]; 
    const col1 = firstMatch[1] || ""; 
    const col2 = firstMatch[2] || ""; 
    const col3 = firstMatch[3] || ""; 

    resultDiv.innerHTML = `
        <div class="result-box">
            <div class="tags-inline">
                ${col1 ? `<div class="tag-gray">${col1}</div>` : ''}
                ${col2 ? `<div class="tag-gray">${col2}</div>` : ''}
            </div>
            ${col3 ? `
                <div class="tag-blue-container">
                    <span class="tag-blue-text">${col3}</span>
                </div>
            ` : ''}
            <div class="bottom-line"></div>
        </div>
    `;
}
</script>

</body>
</html>
