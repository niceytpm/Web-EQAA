<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>EquipmentAA</title><link rel="icon" href="icon.png"><link rel="apple-touch-icon" href="icon.png"><script src="xlsx.full.min.js"></script><style>
:root{color-scheme:dark;--bg:#050912;--card:#0d1626;--line:#263956;--text:#eef4ff;--muted:#91a2ba;--blue:#22b5ed}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#030711,#09111e);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;min-height:100vh}.wrap{max-width:760px;margin:auto;padding:22px 16px 50px}.head{display:flex;align-items:center;gap:12px;margin-bottom:18px}.logo{width:52px;height:52px;border-radius:14px}.head h1{font-size:24px;margin:0}.head p{margin:3px 0 0;color:var(--muted)}.card{background:rgba(13,22,38,.95);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 12px 34px #0007}label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}select,input,button{font:inherit}select,input{width:100%;background:#07101d;color:var(--text);border:1px solid #314765;border-radius:13px;padding:13px}button{border:0;border-radius:13px;padding:12px 16px;font-weight:750;background:linear-gradient(135deg,#31c4f6,#138bc8);color:#02131d}.row{display:flex;gap:10px}.row>*{flex:1}.status{font-size:13px;color:var(--muted);margin-top:9px}.result{display:grid;grid-template-columns:1.3fr .7fr 1fr;gap:8px;padding:13px;border:1px solid #2e4563;border-radius:14px;margin-top:10px;background:#081322}.result b{display:block;font-size:18px}.result small{display:block;color:var(--muted);margin-bottom:3px}.empty{text-align:center;color:var(--muted);padding:24px}.history{font-family:ui-monospace,Consolas,monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#c8d5e7;max-height:260px;overflow:auto}@media(max-width:560px){.result{grid-template-columns:1fr 1fr}.result>div:last-child{grid-column:1/-1}.row{display:block}.row button{width:100%;margin-top:9px}}
</style></head><body><main class="wrap"><header class="head"><img class="logo" src="icon.png"><div><h1>EquipmentAA</h1><p>ค้นหาเลขเครื่องแยกตามโรงงาน</p></div></header><section class="card"><label>เลือกโรงงาน</label><select id="factory"></select><div id="status" class="status">กำลังโหลดรายชื่อโรงงาน...</div></section><section class="card"><label>ค้นหา ID Machine</label><div class="row"><input id="q" placeholder="เช่น 400G" autocomplete="off"><button id="search">ค้นหา</button></div><div id="results" class="empty">เลือกโรงงานแล้วพิมพ์เลขเครื่อง</div></section><section class="card"><label>ประวัติการค้นหา 3 วันล่าสุด</label><div id="history" class="history">ยังไม่มีประวัติ</div></section></main><script>
const $=id=>document.getElementById(id);let rows=[],factories=[];const rawBase='./';
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function norm(v){return String(v??'').trim().toLowerCase()}
async function loadFactories(){try{const r=await fetch(rawBase+'factories.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw 0;const j=await r.json();factories=Array.isArray(j)?j:(j.factories||[])}catch{factories=[]}if(!factories.length){$('status').textContent='ยังไม่มีรายชื่อโรงงาน';$('factory').innerHTML='';$('results').textContent='ยังไม่มีรายชื่อโรงงาน';return}$('factory').innerHTML=factories.map(f=>{const slug=f.slug||String(f.db||'').replace(/^machines_/i,'').replace(/\.db$/i,'')||f.name;return `<option value="${esc(slug)}" data-db="${esc(f.db||'')}">${esc(f.name)}${f.version?' • v'+esc(f.version):''}</option>`}).join('');const saved=localStorage.getItem('eq_factory');if(factories.some(f=>(f.slug||String(f.db||'').replace(/^machines_/i,'').replace(/\.db$/i,'')||f.name)===saved))$('factory').value=saved;await loadData()}
async function loadData(){const slug=$('factory').value;localStorage.setItem('eq_factory',slug);const f=factories.find(x=>(x.slug||String(x.db||'').replace(/^machines_/i,'').replace(/\.db$/i,'')||x.name)===slug)||{};const suffix=String(f.db||`machines_${slug}.db`).replace(/^machines_/i,'').replace(/\.db$/i,'');$('status').textContent='กำลังโหลดข้อมูล '+(f.name||slug)+'...';rows=[];$('results').className='empty';$('results').textContent='กำลังโหลดข้อมูล...';try{const r=await fetch(rawBase+`data_${encodeURIComponent(suffix)}.xlsx?ts=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error('ยังไม่มีข้อมูลของโรงงานนี้');const buf=await r.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const aoa=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});rows=aoa.slice(1).filter(x=>String(x[0]||'').trim()).map(x=>({id:x[0],model:x[1],no:x[2],department:x[3]}));$('status').textContent=`โหลดแล้ว ${rows.length.toLocaleString()} เครื่อง / ${f.name||slug} / v${f.version||'-'}`;$('results').textContent='พิมพ์เลขเครื่องแล้วกดค้นหา'}catch(e){$('status').textContent=e.message||e;$('results').textContent=e.message||e}}
function search(){const q=norm($('q').value);if(!q)return;const found=rows.filter(r=>norm(r.id)===q);const f=factories.find(x=>(x.slug||String(x.db||'').replace(/^machines_/i,'').replace(/\.db$/i,'')||x.name)===$('factory').value);saveHistory(q,found.length,f?.name||$('factory').value);if(!found.length){$('results').className='empty';$('results').textContent='ไม่พบเลขเครื่อง '+$('q').value;return}$('results').className='';$('results').innerHTML=found.map(r=>`<div class="result"><div><small>Model</small><b>${esc(r.model)}</b></div><div><small>No.</small><b>${esc(r.no)}</b></div><div><small>Department</small><b>${esc(r.department)}</b></div></div>`).join('')}
function saveHistory(q,count,factory){const h=JSON.parse(localStorage.getItem('eq_history3')||'[]');h.unshift({at:Date.now(),q,count,factory});localStorage.setItem('eq_history3',JSON.stringify(h.filter(x=>Date.now()-x.at<3*86400000).slice(0,100)));renderHistory()}
function renderHistory(){const h=JSON.parse(localStorage.getItem('eq_history3')||'[]').filter(x=>Date.now()-x.at<3*86400000);$('history').textContent=h.length?h.map(x=>`${new Date(x.at).toLocaleString('th-TH')} | ${x.factory} | ${x.q} | พบ ${x.count}`).join('\n'):'ยังไม่มีประวัติ'}
$('factory').onchange=loadData;$('search').onclick=search;$('q').onkeydown=e=>{if(e.key==='Enter')search()};renderHistory();loadFactories();
</script></body></html>
