<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหา ID MACHINE</title>

<link rel="apple-touch-icon" href="Icon.PNG">

<script src="xlsx.full.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #000000;
    margin: 0;
    padding: 16px;
    display: flex;
    justify-content: center; 
    align-items: flex-start; 
    min-height: 100vh;
}

.container {
    background: #1c1c1e;
    padding: 24px 20px;
    border-radius: 24px;
    width: 100%;
    max-width: 360px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center; 
    position: relative;
}

/* หัวข้อและปุ่มควบคุมหลัก */
.header-area {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
    position: relative;
}

.header-title {
    color: #ffffff;
    font-size: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    text-align: center;
}

.btn-history-trigger {
    position: absolute;
    left: 0;
    background: transparent;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
}

.btn-add {
    position: absolute;
    right: 0;
    background: #2f80ed;
    color: white;
    border: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* โซนกรอกข้อมูล */
.search-row {
    display: flex;
    margin-bottom: 16px;
    align-items: center;
    width: 100%;
    border-bottom: 1px solid #2c2c2e; 
    padding-bottom: 8px;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    color: #ffffff;
    font-size: 18px;
    outline: none;
    width: 100%;
    text-align: center;
}

input::placeholder {
    color: #55555c;
}

/* ปุ่มค้นหา */
.btn-search {
    width: 100%;
    background: #2f80ed;
    color: #ffffff;
    border: none;
    font-size: 18px;
    font-weight: 500;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 20px;
    text-align: center;
}

.status {
    font-size: 14px;
    color: #ff453a;
    text-align: center;
    margin-bottom: 10px;
}

/* ส่วนของผลลัพธ์ */
.result-box {
    display: flex;
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    gap: 12px;
    width: 100%;
}

.tags-inline {
    display: flex;
    justify-content: center; 
    gap: 8px;
    flex-wrap: wrap; 
    width: 100%;
}

.tag-gray {
    background: #242426;
    color: #ffffff;
    padding: 6px 16px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    text-align: center;
}

.tag-blue-container {
    background: #101a2d;
    padding: 6px 18px;
    border-radius: 12px;
    display: inline-flex;
    justify-content: center;
}

.tag-blue-text {
    color: #2f80ed;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
}

.bottom-line {
    width: 100%;
    height: 1px;
    background: #2c2c2e;
    margin-top: 15px;
}

/* ---- หน้าต่างป็อปอัพ (Modal) ---- */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
    padding: 16px;
}

.modal-content {
    background: #1c1c1e;
    padding: 20px;
    border-radius: 20px;
    width: 100%;
    max-width: 340px;
    border: 1px solid #2c2c2e;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.modal-title {
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 5px;
}

.modal-subtitle {
    color: #2f80ed;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    margin-top: -4px;
    margin-bottom: 4px;
}

.modal-input {
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 8px;
    padding: 10px;
    color: white;
    font-size: 14px;
    width: 100%;
    text-align: left;
}

.modal-file-label {
    background: #242426;
    color: #2f80ed;
    border: 1px dashed #2f80ed;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
}

.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 5px;
}

.btn-cancel {
    flex: 1;
    background: #3a3a3c;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-next, .btn-upload {
    flex: 1;
    background: #34c759;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}
.btn-next {
    background: #007aff;
}

/* ส่วนกล่องเลือกวันที่ในหน้าประวัติ */
.history-date-picker {
    width: 100%;
    background: #2c2c2e;
    border: 1px solid #3a3a3c;
    border-radius: 8px;
    padding: 8px;
    color: #ffffff;
    font-size: 14px;
    text-align: center;
    outline: none;
    cursor: pointer;
}

/* ส่วนเลือกกะการทำงาน (Shift Filter) เพิ่มแท็บทั้งหมดเข้าไป */
.shift-tabs {
    display: flex;
    background: #2c2c2e;
    padding: 2px;
    border-radius: 8px;
    gap: 2px;
}

.shift-tab {
    flex: 1;
    background: transparent;
    border: none;
    color: #8e8e93;
    padding: 8px 0;
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
}

.shift-tab.active {
    background: #101a2d;
    color: #2f80ed;
    font-weight: bold;
}

/* ลิสต์ประวัติการค้นหา */
.history-list {
    max-height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
}

.history-item {
    background: #2c2c2e;
    padding: 10px 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.history-code {
    color: #ffffff;
    font-size: 14px;
    font-weight: 500;
}

.history-time {
    color: #8e8e93;
    font-size: 11px;
    text-align: right;
}
</style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <button class="btn-history-trigger" onclick="openHistoryModal()">🕒</button>
        <div class="header-title">🔍 ค้นหา ID MACHINE</div>
        <button class="btn-add" onclick="openLoginModal()">+</button>
    </div>

    <div class="search-row">
        <input id="machineCode" placeholder="EYHJE2400018" enterkeyhint="search" onkeydown="if(event.key === 'Enter') search()">
    </div>
    
    <button class="btn-search" onclick="search()">ค้นหา</button>

    <div class="status" id="status"></div>
    
    <div id="result" style="width: 100%;"></div>
</div>

<div class="modal-overlay" id="loginModal">
    <div class="modal-content">
        <div class="modal-title">🔒 เข้าสู่ระบบ Admin</div>
        <input type="text" id="adminId" class="modal-input" placeholder="Admin ID">
        <input type="password" id="adminPass" class="modal-input" placeholder="Password">
        
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('loginModal')">ยกเลิก</button>
            <button class="btn-next" onclick="verifyAdmin()">ถัดไป</button>
        </div>
        <div id="loginStatus" style="font-size: 12px; text-align: center; color: #ff453a;"></div>
    </div>
</div>

<div class="modal-overlay" id="uploadModal">
    <div class="modal-content">
        <div class="modal-title">⚙️ GitHub อัปโหลดข้อมูล</div>
        <input type="password" id="ghToken" class="modal-input" placeholder="GitHub Personal Access Token">
        
        <label class="modal-file-label">
            📁 เลือกไฟล์ data.xlsx จากเครื่อง
            <input type="file" id="excelFile" accept=".xlsx" style="display: none;" onchange="updateFileLabel(this)">
        </label>
        <div id="fileNameDisplay" style="color: #8e8e93; font-size: 12px; text-align: center; margin-top: -5px;">ยังไม่ได้เลือกไฟล์</div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('uploadModal')">ยกเลิก</button>
            <button class="btn-upload" onclick="uploadToGitHub()">อัปโหลด</button>
        </div>
        <div id="modalStatus" style="font-size: 12px; text-align: center; color: #ff453a;"></div>
    </div>
</div>

<div class="modal-overlay" id="historyModal">
    <div class="modal-content">
        <div class="modal-title">🕒 ประวัติการค้นหา</div>
        <div class="modal-subtitle" id="historyCount">จำนวนทั้งหมด: 0 รายการ</div>
        
        <input type="date" id="historyDate" class="history-date-picker" onchange="updateHistoryDate()">

        <div class="shift-tabs">
            <button class="shift-tab active" id="tab-all" onclick="changeHistoryShift('all')">ทั้งหมด</button>
            <button class="shift-tab" id="tab-day" onclick="changeHistoryShift('day')">เช้า (8-20)</button>
            <button class="shift-tab" id="tab-night" onclick="changeHistoryShift('night')">ดึก (20-8)</button>
        </div>

        <div class="history-list" id="historyContainer"></div>
        
        <div class="modal-actions">
            <button class="btn-cancel" style="flex:1;" onclick="closeModal('historyModal')">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<script>
let data = [];
let currentShiftFilter = 'all'; // เริ่มต้นหน้าประวัติแสดงแท็บทั้งหมดของวันนั้น ๆ ก่อน

const CONFIG_ADMIN_ID   = "nicertp";    
const CONFIG_ADMIN_PASS = "20686";   

const GITHUB_USER = "niceytpm";       
const GITHUB_REPO = "Web-EQAA";       
const GITHUB_PATH = "data.xlsx";      

window.addEventListener('DOMContentLoaded', () => {
    cleanOldHistory();
});

fetch("data.xlsx")
.then(r => r.arrayBuffer())
.then(b => {
    const wb = XLSX.read(b, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    let rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
    data = rows.slice(1).filter(r => r[0]);
})
.catch(() => {
    document.getElementById("status").innerText = "❌ โหลดไฟล์ Excel ไม่ได้";
});

function clean(v) {
    return String(v || "").replace(/[\s\u00A0]+/g, "").toUpperCase();
}

function search() {
    const key = clean(document.getElementById("machineCode").value);
    const resultDiv = document.getElementById("result");
    const status = document.getElementById("status");

    resultDiv.innerHTML = "";
    status.innerText = "";
    document.getElementById("machineCode").blur();

    if (!key) return;

    const found = data.filter(r => clean(r[0]).includes(key));

    if (found.length === 0) {
        status.innerText = "❌ ไม่พบข้อมูล";
        return;
    }

    const firstMatch = found[0]; 
    const col1 = firstMatch[1] || ""; 
    const col2 = firstMatch[2] || ""; 
    const col3 = firstMatch[3] || ""; 

    saveToHistory(key);

    resultDiv.innerHTML = `
        <div class="result-box">
            <div class="tags-inline">
                ${col1 ? `<div class="tag-gray">${col1}</div>` : ''}
                ${col2 ? `<div class="tag-gray">${col2}</div>` : ''}
            </div>
            ${col3 ? `
                <div class="tag-blue-container">
                    <span class="tag-blue-text">${col3}</span>
                </div>
            ` : ''}
            <div class="bottom-line"></div>
        </div>
    `;
}

/* ================= [ ระบบประวัติคำนวณแยกย่อยกะ + แสดงผลยอดสรุป ] ================= */

function saveToHistory(code) {
    let history = JSON.parse(localStorage.getItem('search_history')) || [];
    history = history.filter(item => item.code !== code);
    
    history.unshift({
        code: code,
        time: new Date().getTime()
    });
    
    localStorage.setItem('search_history', JSON.stringify(history));
}

function cleanOldHistory() {
    let history = JSON.parse(localStorage.getItem('search_history')) || [];
    const now = new Date().getTime();
    const fortyEightHours = 24 * 60 * 60 * 1000 * 2; 
    
    history = history.filter(item => (now - item.time) < fortyEightHours);
    localStorage.setItem('search_history', JSON.stringify(history));
}

function getLocalDateString(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

function openHistoryModal() {
    cleanOldHistory();
    
    // รีเซ็ตค่าแท็บกลับมาที่ "ทั้งหมด" ทุกครั้งเมื่อเปิดหน้าประวัติ
    currentShiftFilter = 'all';
    document.getElementById("tab-all").classList.add("active");
    document.getElementById("tab-day").classList.remove("active");
    document.getElementById("tab-night").classList.remove("active");

    // โหลดวันที่ปัจจุบันใส่ลงในช่องอินพุตเสมอเมื่อเปิดขึ้นมา
    const now = new Date();
    const datePicker = document.getElementById("historyDate");
    datePicker.value = getLocalDateString(now);

    // ล็อกปฏิทินให้เลือกกดได้แค่ขอบเขตช่วง 2 วันล่าสุดเท่านั้น (วันนี้ และ เมื่อวาน)
    const yesterday = new Date(now.getTime() - (24 * 60 * 60 * 1000));
    datePicker.max = getLocalDateString(now);
    datePicker.min = getLocalDateString(yesterday);

    renderHistoryList();
    document.getElementById("historyModal").style.display = "flex";
}

function changeHistoryShift(shift) {
    currentShiftFilter = shift;
    document.getElementById("tab-all").classList.remove("active");
    document.getElementById("tab-day").classList.remove("active");
    document.getElementById("tab-night").classList.remove("active");
    document.getElementById("tab-" + shift).classList.add("active");
    
    renderHistoryList();
}

function updateHistoryDate() {
    renderHistoryList();
}

function renderHistoryList() {
    const history = JSON.parse(localStorage.getItem('search_history')) || [];
    const container = document.getElementById("historyContainer");
    container.innerHTML = "";
    
    const selectedDateVal = document.getElementById("historyDate").value;
    if (!selectedDateVal) return;

    // แยกข้อมูลปี เดือน วัน เพื่อคำนวณช่วงเวลากะงานรายวันแบบแม่นยำ
    const [sYear, sMonth, sDay] = selectedDateVal.split('-').map(Number);
    
    // คำนวณช่วงของกะเช้า (08:00 น. - 20:00 น. ของวันนั้น ๆ)
    const target8AM = new Date(sYear, sMonth - 1, sDay, 8, 0, 0, 0).getTime();
    const target8PM = new Date(sYear, sMonth - 1, sDay, 20, 0, 0, 0).getTime();
    
    // คำนวณขอบเขตสิ้นสุดกะดึก (08:00 น. ของเช้าวันถัดไป)
    const nextDay8AM = target8AM + (24 * 60 * 60 * 1000);

    const filteredHistory = history.filter(item => {
        const itemTime = item.time;
        
        if (currentShiftFilter === 'day') {
            // แสดงเฉพาะรายการกะเช้าของวันที่เลือก
            return itemTime >= target8AM && itemTime < target8PM;
        } else if (currentShiftFilter === 'night') {
            // แสดงเฉพาะรายการกะดึกวนลูปของวันที่เลือก (20:00น. ข้ามไปถึง 08:00น. อีกวัน)
            return itemTime >= target8PM && itemTime < nextDay8AM;
        } else if (currentShiftFilter === 'all') {
            // แสดงรวมทั้งหมด ทั้งกะเช้าและกะดึกที่ผูกกับวันที่เลือก (ตั้งแต่ 08:00น. ยิงยาวไปจนถึง 08:00น. ของเช้าอีกวัน)
            return itemTime >= target8AM && itemTime < nextDay8AM;
        }
        return false;
    });
    
    // อัปเดตตัวเลขบอกยอดรวมทั้งหมดของเงื่อนไขที่ผู้ใช้เลือกแบบเรียลไทม์
    document.getElementById("historyCount").innerText = `จำนวนทั้งหมด: ${filteredHistory.length} รายการ`;
    
    if (filteredHistory.length === 0) {
        container.innerHTML = `<div style="color:#8e8e93; font-size:14px; text-align:center; padding:20px 0;">ไม่มีข้อมูลประวัติในช่วงเวลานี้</div>`;
    } else {
        filteredHistory.forEach(item => {
            const date = new Date(item.time);
            
            // แสดงผลชื่อวันย่อและวันที่ตามแบบไทย เช่น "ส. 13 มิ.ย."
            const dateStr = date.toLocaleDateString('th-TH', { weekday: 'short', day: 'numeric', month: 'short' });
            const timeStr = date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
            
            const div = document.createElement('div');
            div.className = 'history-item';
            div.onclick = () => {
                document.getElementById("machineCode").value = item.code;
                search();
                closeModal('historyModal');
            };
            div.innerHTML = `
                <span class="history-code">${item.code}</span>
                <span class="history-time">${dateStr}<br>${timeStr}</span>
            `;
            container.appendChild(div);
        });
    }
}

/* ========================================================================= */

function openLoginModal() {
    document.getElementById("loginModal").style.display = "flex";
    document.getElementById("loginStatus").innerText = "";
    document.getElementById("adminId").value = "";
    document.getElementById("adminPass").value = "";
}

function verifyAdmin() {
    const inputId   = clean(document.getElementById("adminId").value);
    const inputPass = clean(document.getElementById("adminPass").value);
    
    const targetId   = clean(CONFIG_ADMIN_ID);
    const targetPass = clean(CONFIG_ADMIN_PASS);

    const loginStatus = document.getElementById("loginStatus");

    if (inputId === targetId && inputPass === targetPass) {
        closeModal('loginModal');
        openUploadModal();
    } else {
        loginStatus.innerText = "⚠️ Admin ID หรือ Password ไม่ถูกต้อง";
    }
}

function openUploadModal() {
    document.getElementById("uploadModal").style.display = "flex";
    document.getElementById("modalStatus").innerText = "";
}

function closeModal(modalId) {
    document.getElementById(modalId).style.display = "none";
}

function updateFileLabel(input) {
    const label = document.getElementById("fileNameDisplay");
    if (input.files.length > 0) {
        label.innerText = "เลือกไฟล์แล้ว: " + input.files[0].name;
        label.style.color = "#34c759";
    } else {
        label.innerText = "ยังไม่ได้เลือกไฟล์";
        label.style.color = "#8e8e93";
    }
}

async function uploadToGitHub() {
    const token = document.getElementById("ghToken").value.trim();
    const fileInput = document.getElementById("excelFile");
    const modalStatus = document.getElementById("modalStatus");

    if (!token || fileInput.files.length === 0) {
        modalStatus.style.color = "#ff453a";
        modalStatus.innerText = "⚠️ กรุณากรอก Token และเลือกไฟล์ให้เรียบร้อย";
        return;
    }

    modalStatus.style.color = "#2f80ed";
    modalStatus.innerText = "⏳ กำลังเชื่อมต่อ GitHub...";

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async function () {
        const base64Content = reader.result.split(',')[1];
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_PATH}`;
        let sha = null;
        
        try {
            const resCheck = await fetch(url, {
                headers: { "Authorization": `token ${token}` }
            });
            if (resCheck.ok) {
                const dataCheck = await resCheck.json();
                sha = dataCheck.sha;
            }
        } catch (e) {}

        try {
            const bodyData = {
                message: `Update ${GITHUB_PATH} via Machine Finder Application`,
                content: base64Content
            };
            if (sha) bodyData.sha = sha;

            const resUpload = await fetch(url, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(bodyData)
            });

            if (resUpload.ok) {
                modalStatus.style.color = "#34c759";
                modalStatus.innerText = "🎉 อัปโหลดไฟล์ทับข้อมูลเก่าใน GitHub สำเร็จ!";
                setTimeout(() => {
                    closeModal('uploadModal');
                    location.reload(); 
                }, 1500);
            } else {
                const errData = await resUpload.json();
                modalStatus.style.color = "#ff453a";
                modalStatus.innerText = `❌ ผิดพลาด: ${errData.message || 'ส่งข้อมูลไม่สำเร็จ'}`;
            }
        } catch (err) {
            modalStatus.style.color = "#ff453a";
            modalStatus.innerText = "❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ GitHub ได้";
        }
    };
}
</script>
